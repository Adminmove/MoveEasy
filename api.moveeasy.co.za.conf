# ============================================================
# Nginx Configuration — MoveEasy API Server
# EC2 Instance: 13.245.30.253 · af-south-1
# Domain: api.moveeasy.co.za
# SSL: Certbot/Let's Encrypt (pending DNS propagation)
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=60r/m;

# Upstream API servers (Node.js / Hono)
upstream moveeasy_api {
    server 127.0.0.1:3001 weight=1 fail_timeout=10s max_fails=3;
    keepalive 32;
}

upstream moveeasy_brain {
    server 127.0.0.1:3002 weight=1 fail_timeout=15s max_fails=2;
    keepalive 16;
}

# ─────────────────────────────────────────────
# HTTP → HTTPS Redirect
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name api.moveeasy.co.za;
    
    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ─────────────────────────────────────────────
# HTTPS Main API Server
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.moveeasy.co.za;

    # SSL Certificates (Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.moveeasy.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.moveeasy.co.za/privkey.pem;
    
    # SSL Hardening
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    
    # Security Headers (PCI-DSS + POPIA compliant)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.moveeasy.co.za" always;
    
    # Hide server version
    server_tokens off;

    # ─────────────────────────────────────────
    # CORS Headers (global)
    # ─────────────────────────────────────────
    set $cors_origin "";
    if ($http_origin ~* (moveeasy\.co\.za|localhost:3000)) {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin  $cors_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Preflight
    location ~ ^/api/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Access-Control-Max-Age 86400;
            return 204;
        }
    }

    # ─────────────────────────────────────────
    # Auth endpoints (stricter rate limiting)
    # ─────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        
        proxy_pass          http://moveeasy_api;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
    }

    # ─────────────────────────────────────────
    # Payment Webhooks (Nedbank + Ozow + PayFast)
    # Allow external IPs, higher rate limit
    # ─────────────────────────────────────────
    location /api/payments/webhook/ {
        limit_req zone=webhook_limit burst=20 nodelay;
        
        # Nedbank gateway IPs (add real IPs from Nedbank documentation)
        # allow 196.xxx.xxx.0/24;
        # Ozow IPs
        # allow 196.yyy.yyy.0/24;
        # deny all; # uncomment in production

        proxy_pass          http://moveeasy_api;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";
        proxy_read_timeout  30s;
    }

    # ─────────────────────────────────────────
    # AI Brain (longer timeout for Anthropic)
    # ─────────────────────────────────────────
    location /api/brain/ {
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass          http://moveeasy_brain;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";
        proxy_read_timeout  90s;  # Allow time for Anthropic API
        proxy_send_timeout  30s;
        proxy_buffering     off;  # Stream AI responses
    }

    # ─────────────────────────────────────────
    # General API
    # ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass          http://moveeasy_api;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Connection         "";
        proxy_read_timeout  60s;
        proxy_send_timeout  30s;
        
        # Response caching for GET endpoints
        proxy_cache_valid 200 5m;
        proxy_cache_methods GET HEAD;
    }

    # ─────────────────────────────────────────
    # Health check (no auth, no rate limit)
    # ─────────────────────────────────────────
    location /health {
        proxy_pass         http://moveeasy_api/health;
        access_log         off;
    }

    # Logging
    access_log  /var/log/nginx/moveeasy_access.log combined;
    error_log   /var/log/nginx/moveeasy_error.log warn;

    # Max request body (file uploads for KYC)
    client_max_body_size 10M;
}
